# NXCTL configuration

github_repo: https://github.com/nxctf/nxctl-challenges
branch: main
access_token: ${GITHUB_TOKEN}

dir_app: ./data

# base_ip: "192.168.56.101"
# api_token: ${NXCTL_API_TOKEN}
# api_admin_secret: ${NXCTL_API_ADMIN_SECRET}

enable_ngrok: true
enable_localtunnel: true
enable_pinggy: true
ngrok_max_sessions_per_token: 3

default_ttl_minutes: 15
extend_time_minutes: 10
extend_threshold_minutes: 5
extend_cooldown_seconds: 30
daemon_interval: 10
restart_cooldown_seconds: 300
auto_heal_exports: true
export_auto_heal_interval_seconds: 120
export_start_lock_timeout_seconds: 60
export_start_lock_stale_seconds: 180
export_endpoint_check_interval_seconds: 120
export_endpoint_check_timeout_seconds: 5
export_endpoint_check_grace_seconds: 120
pinggy_startup_retries: 3
pinggy_start_timeout_seconds: 30
pinggy_ready_probe_timeout_seconds: 2
pinggy_stability_seconds: 10
pinggy_start_probe_connect: false
localtunnel_stability_seconds: 5

local_port_start: 40000
local_port_end: 49999
randomize_local_ports: true
docker_start_port_retries: 5

ngrok_tokens:
  - ${NGROK_TOKEN_1}
  - ${NGROK_TOKEN_2}
  - ${NGROK_TOKEN_3}
  - ${NGROK_TOKEN_4}
  - ${NGROK_TOKEN_5}
  - ${NGROK_TOKEN_6}
  - ${NGROK_TOKEN_7}
  - ${NGROK_TOKEN_8}
  - ${NGROK_TOKEN_9}
  - ${NGROK_TOKEN_10}
