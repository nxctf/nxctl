# NXCTL configuration

github_repo: https://github.com/nxctf/nxctl-challenges
branch: main
access_token: ${GITHUB_TOKEN}

cache_dir: ./data/chall
build_dir: ./data/build
db_file: ./data/nxctl.db
base_ip: "192.168.56.101"

default_tunnel: localtunnel
enable_ngrok: true
enable_localtunnel: true
enable_pinggy: true

# TTL settings
default_ttl_minutes: 15
extend_time_minutes: 10
extend_threshold_minutes: 5
daemon_interval: 10
restart_cooldown_seconds: 300
auto_heal_exports: true

ngrok_tokens:
  - ${NGROK_TOKEN_1}
  - ${NGROK_TOKEN_2}
  - ${NGROK_TOKEN_3}
  - ${NGROK_TOKEN_4}
  - ${NGROK_TOKEN_5}
  - ${NGROK_TOKEN_6}

pinggy_token: ${PINGGY_TOKEN}
