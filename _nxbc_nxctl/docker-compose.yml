services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:stable
    entrypoint:
      - anvil
    command:
      - --host
      - 0.0.0.0
      - --port
      - "8545"
      - --chain-id
      - "31337"
      - --accounts
      - "4"
      - --balance
      - "1000"
      - --block-base-fee-per-gas
      - "0"
    expose:
      - "8545"
    healthcheck:
      test: ["CMD-SHELL", "cast chain-id --rpc-url http://127.0.0.1:8545 >/dev/null 2>&1"]
      interval: 2s
      timeout: 2s
      retries: 30

  rpc:
    image: python:3.12-alpine
    depends_on:
      anvil:
        condition: service_healthy
    environment:
      SERVICE_TYPE: http
      UPSTREAM_RPC_URL: http://anvil:8545
      RPC_PROXY_PORT: "8545"
    ports:
      - "8545:8545"
    volumes:
      - ./scripts/rpc_proxy.py:/app/rpc_proxy.py:ro
    command: ["python", "/app/rpc_proxy.py"]

  deployer:
    image: ghcr.io/foundry-rs/foundry:stable
    depends_on:
      anvil:
        condition: service_healthy
    working_dir: /workspace
    environment:
      RPC_URL: http://anvil:8545
      PUBLIC_RPC_URL: http://localhost:8545
      RPC_PORT: "8545"
      CHAIN_ID: "31337"
      DEPLOYER_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      CHALLENGE_NAME: "04-convergence"
      FACTORY_CONTRACT: "contracts/ChallengeFactory.sol:ChallengeFactory"
      SETUP_CONTRACT: "contracts/Setup.sol:Setup"
      CHECKER: "ChallengeFactory.isSolved(address)"
    volumes:
      - ./:/workspace
    entrypoint: ["/bin/sh", "/workspace/scripts/deploy.sh"]
    restart: "no"

  portal:
    build:
      context: .
      dockerfile: portal/Dockerfile
    depends_on:
      anvil:
        condition: service_healthy
      deployer:
        condition: service_completed_successfully
    working_dir: /workspace
    environment:
      CHALLENGE_ID: "04-convergence"
      RPC_URL: http://anvil:8545
      PUBLIC_RPC_URL: http://localhost:8545
      PORTAL_PUBLIC_URL: http://localhost:8080
      METADATA_PATH: /workspace/metadata/metadata.json
      STATE_PATH: /workspace/metadata/portal_state.json
      FLAG: "FGTE{local_convergence_flag_from_backend}"
      FUNDER_PRIVKEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      FAUCET_AMOUNT_ETH: "0.2"
      FAUCET_MIN_BALANCE_ETH: "0.05"
    ports:
      - "8080:8080"
    volumes:
      - ./:/workspace
    restart: unless-stopped
