<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NXBC Launcher</title>
    <style>
      :root {
        --bg: #f6f7f2;
        --ink: #1e2528;
        --muted: #617073;
        --line: #d7ddd5;
        --panel: #ffffff;
        --accent: #0f766e;
        --accent-strong: #0b5d56;
        --danger: #b42318;
        --ok: #167246;
        --code: #111827;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      .shell {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding-bottom: 18px;
        border-bottom: 1px solid var(--line);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .mark {
        width: 38px;
        height: 38px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        background: var(--ink);
        color: white;
        font-weight: 800;
        letter-spacing: 0;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        line-height: 1.2;
      }

      .subtitle {
        margin: 3px 0 0;
        color: var(--muted);
        font-size: 13px;
      }

      .status {
        min-height: 32px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 6px 10px;
        background: #fff;
        color: var(--muted);
        white-space: nowrap;
      }

      .grid {
        display: grid;
        grid-template-columns: 340px 1fr;
        gap: 18px;
        margin-top: 22px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
      }

      .panel h2 {
        margin: 0 0 14px;
        font-size: 15px;
        line-height: 1.2;
      }

      label {
        display: block;
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 6px;
      }

      input {
        width: 100%;
        min-height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px 10px;
        color: var(--ink);
        background: #fff;
        outline: none;
      }

      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.14);
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 12px;
      }

      button {
        min-height: 38px;
        border: 1px solid transparent;
        border-radius: 6px;
        padding: 8px 11px;
        cursor: pointer;
        background: var(--accent);
        color: #fff;
        font-weight: 700;
      }

      button:hover {
        background: var(--accent-strong);
      }

      button.secondary {
        background: #fff;
        color: var(--ink);
        border-color: var(--line);
      }

      button.secondary:hover {
        background: #eef2ee;
      }

      button:disabled {
        opacity: 0.55;
        cursor: wait;
      }

      .fields {
        display: grid;
        gap: 10px;
      }

      .value-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
      }

      .value {
        min-height: 38px;
        display: flex;
        align-items: center;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 8px 10px;
        color: var(--code);
        background: #f9faf8;
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 12px;
        white-space: nowrap;
        text-overflow: ellipsis;
      }

      .copy {
        width: 38px;
        min-height: 38px;
        padding: 0;
      }

      .command {
        margin: 0;
        min-height: 154px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 12px;
        background: #111827;
        color: #ecfdf5;
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: 12px;
        line-height: 1.55;
      }

      .result {
        min-height: 74px;
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 12px;
        background: #f9faf8;
        color: var(--muted);
        font-size: 13px;
      }

      .result.ok {
        color: var(--ok);
        border-color: rgba(22, 114, 70, 0.35);
      }

      .result.err {
        color: var(--danger);
        border-color: rgba(180, 35, 24, 0.35);
      }

      .split {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 12px;
      }

      @media (max-width: 820px) {
        .shell {
          width: min(100vw - 24px, 720px);
          padding-top: 18px;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .grid,
        .split {
          grid-template-columns: 1fr;
        }

        .actions {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="topbar">
        <div class="brand">
          <div class="mark">NX</div>
          <div>
            <h1>NXBC Launcher</h1>
            <p class="subtitle">04-convergence</p>
          </div>
        </div>
        <div class="status" id="status">ready</div>
      </div>

      <section class="grid">
        <div class="panel">
          <h2>Session</h2>
          <p class="subtitle" style="margin: 0 0 12px">
            Solve the launcher challenge first, then launch with the active
            session cookie.
          </p>
          <div class="actions">
            <button id="challengeBtn">Challenge</button>
            <button id="launchBtn">Launch</button>
            <button class="secondary" id="checkBtn">Check</button>
          </div>
          <div class="result" id="result">No instance loaded.</div>
        </div>

        <div class="panel">
          <h2>Instance</h2>
          <div class="fields">
            <div>
              <label>RPC URL</label>
              <div class="value-row">
                <div class="value" id="rpcUrl">-</div>
                <button class="copy secondary" data-copy="rpcUrl">⧉</button>
              </div>
            </div>
            <div class="split">
              <div>
                <label>Wallet</label>
                <div class="value-row">
                  <div class="value" id="wallet">-</div>
                  <button class="copy secondary" data-copy="wallet">⧉</button>
                </div>
              </div>
              <div>
                <label>Setup</label>
                <div class="value-row">
                  <div class="value" id="setup">-</div>
                  <button class="copy secondary" data-copy="setup">⧉</button>
                </div>
              </div>
            </div>
            <div>
              <label>Private Key</label>
              <div class="value-row">
                <div class="value" id="privkey">-</div>
                <button class="copy secondary" data-copy="privkey">⧉</button>
              </div>
            </div>
            <div>
              <label>Solver Env</label>
              <div class="value-row">
                <pre class="command" id="command">Launch first.</pre>
                <button class="copy secondary" data-copy="command">⧉</button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script>
      const challengeId = "04-convergence";
      const els = {
        status: document.querySelector("#status"),
        result: document.querySelector("#result"),
        challengeBtn: document.querySelector("#challengeBtn"),
        launchBtn: document.querySelector("#launchBtn"),
        checkBtn: document.querySelector("#checkBtn"),
        rpcUrl: document.querySelector("#rpcUrl"),
        wallet: document.querySelector("#wallet"),
        setup: document.querySelector("#setup"),
        privkey: document.querySelector("#privkey"),
        command: document.querySelector("#command"),
      };

      function setBusy(isBusy) {
        els.challengeBtn.disabled = isBusy;
        els.launchBtn.disabled = isBusy;
        els.checkBtn.disabled = isBusy;
      }

      function setStatus(text) {
        els.status.textContent = text;
      }

      function setResult(text, kind = "") {
        els.result.className = `result ${kind}`.trim();
        els.result.textContent = text;
      }

      function userHeaders() {
        return {
          "Content-Type": "application/json",
          "X-User-Id": "user-local",
        };
      }

      async function postJson(path, body, headers) {
        const response = await fetch(path, {
          method: "POST",
          headers,
          body: body ? JSON.stringify(body) : undefined,
          credentials: "include",
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.detail || data.error || JSON.stringify(data));
        }
        return data;
      }

      async function getJson(path) {
        const response = await fetch(path, {
          method: "GET",
          credentials: "include",
          headers: { "Content-Type": "application/json" },
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.detail || data.error || JSON.stringify(data));
        }
        return data;
      }

      function wordsToHex(words) {
        return words
          .map((word) => word.toString(16).padStart(8, "0"))
          .join("");
      }

      function sha256Fallback(text) {
        const encoder = new TextEncoder();
        const bytes = encoder.encode(text);
        const length = bytes.length;
        const totalLength = (((length + 9 + 63) >> 6) << 6) / 4;
        const words = new Array(totalLength).fill(0);

        for (let index = 0; index < length; index += 1) {
          words[index >> 2] |= bytes[index] << ((3 - (index & 3)) * 8);
        }
        words[length >> 2] |= 0x80 << ((3 - (length & 3)) * 8);
        words[totalLength - 2] = Math.floor((length * 8) / 0x100000000);
        words[totalLength - 1] = (length * 8) >>> 0;

        const h = [
          0x6a09e667,
          0xbb67ae85,
          0x3c6ef372,
          0xa54ff53a,
          0x510e527f,
          0x9b05688c,
          0x1f83d9ab,
          0x5be0cd19,
        ];

        const k = [
          0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5,
          0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
          0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3,
          0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
          0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc,
          0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
          0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7,
          0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
          0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13,
          0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
          0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3,
          0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
          0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5,
          0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
          0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208,
          0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2,
        ];

        for (let offset = 0; offset < words.length; offset += 16) {
          const w = new Array(64);
          for (let i = 0; i < 16; i += 1) {
            w[i] = words[offset + i] >>> 0;
          }
          for (let i = 16; i < 64; i += 1) {
            const s0 =
              ((w[i - 15] >>> 7) | (w[i - 15] << 25)) ^
              ((w[i - 15] >>> 18) | (w[i - 15] << 14)) ^
              (w[i - 15] >>> 3);
            const s1 =
              ((w[i - 2] >>> 17) | (w[i - 2] << 15)) ^
              ((w[i - 2] >>> 19) | (w[i - 2] << 13)) ^
              (w[i - 2] >>> 10);
            w[i] = (((w[i - 16] + s0) >>> 0) + ((w[i - 7] + s1) >>> 0)) >>> 0;
          }

          let [a, b, c, d, e, f, g, hh] = h;
          for (let i = 0; i < 64; i += 1) {
            const s1 =
              ((e >>> 6) | (e << 26)) ^
              ((e >>> 11) | (e << 21)) ^
              ((e >>> 25) | (e << 7));
            const ch = (e & f) ^ (~e & g);
            const temp1 = (((hh + s1) >>> 0) + ((ch + k[i]) >>> 0) + w[i]) >>> 0;
            const s0 =
              ((a >>> 2) | (a << 30)) ^
              ((a >>> 13) | (a << 19)) ^
              ((a >>> 22) | (a << 10));
            const maj = (a & b) ^ (a & c) ^ (b & c);
            const temp2 = (s0 + maj) >>> 0;

            hh = g;
            g = f;
            f = e;
            e = (d + temp1) >>> 0;
            d = c;
            c = b;
            b = a;
            a = (temp1 + temp2) >>> 0;
          }

          h[0] = (h[0] + a) >>> 0;
          h[1] = (h[1] + b) >>> 0;
          h[2] = (h[2] + c) >>> 0;
          h[3] = (h[3] + d) >>> 0;
          h[4] = (h[4] + e) >>> 0;
          h[5] = (h[5] + f) >>> 0;
          h[6] = (h[6] + g) >>> 0;
          h[7] = (h[7] + hh) >>> 0;
        }

        return wordsToHex(h);
      }

      async function sha256Hex(text) {
        const subtle = globalThis.crypto && globalThis.crypto.subtle;
        if (subtle) {
          const bytes = new TextEncoder().encode(text);
          const digest = await subtle.digest("SHA-256", bytes);
          return Array.from(new Uint8Array(digest))
            .map((byte) => byte.toString(16).padStart(2, "0"))
            .join("");
        }

        return sha256Fallback(text);
      }

      async function solvePow(challenge) {
        let nonce = 0;
        while (true) {
          const solution = String(nonce);
          const digest = await sha256Hex(`${challenge.prefix}:${solution}`);
          if (digest.startsWith(challenge.zero_prefix)) {
            return solution;
          }
          nonce += 1;
          if (nonce % 256 === 0) {
            setStatus(`solving ${nonce}`);
            await new Promise((resolve) => window.setTimeout(resolve, 0));
          }
        }
      }

      async function createTicket() {
        const challenge = await postJson("/challenge", null, userHeaders());
        setStatus("solving challenge");
        const solution = await solvePow(challenge);
        return postJson(
          "/solution",
          {
            challenge_token: challenge.challenge_token,
            solution,
          },
          userHeaders()
        );
      }

      async function api(path) {
        return postJson(path, null, { "Content-Type": "application/json" });
      }

      async function loadExistingInstance() {
        try {
          const instance = await getJson(`/data/${challengeId}`);
          if (instance) {
            renderInstance(instance);
            setResult("Existing session restored.", "ok");
            setStatus("ready");
          }
        } catch {
          // No active session to restore.
        }
      }

      async function challenge() {
        setBusy(true);
        setStatus("solving challenge");
        try {
          await createTicket();
          setResult("Launcher session ready. Now click Launch.", "ok");
          setStatus("ready");
        } catch (error) {
          setResult(error.message, "err");
          setStatus("error");
        } finally {
          setBusy(false);
        }
      }

      function renderInstance(instance) {
        els.rpcUrl.textContent = instance.rpc_url || "-";
        els.wallet.textContent = instance.wallet_address || "-";
        els.setup.textContent = instance.setup_contract || "-";
        els.privkey.textContent = instance.private_key || "-";
        els.command.textContent = [
          `export RPC_URL=${instance.rpc_url}`,
          `export PRIVKEY=${instance.private_key}`,
          `export SETUP_ADDR=${instance.setup_contract}`,
          "python3 solver.py",
        ].join("\n");
      }

      async function launch() {
        setBusy(true);
        setStatus("launching");
        try {
          const instance = await api(`/launch/${challengeId}`);
          renderInstance(instance);
          setResult(
            instance.reused
              ? "Existing active instance loaded."
              : "Instance launched.",
            "ok"
          );
          setStatus("ready");
        } catch (error) {
          setResult(error.message, "err");
          setStatus("error");
        } finally {
          setBusy(false);
        }
      }

      async function check() {
        setBusy(true);
        setStatus("checking");
        try {
          const result = await api(`/check/${challengeId}`);
          if (result.solved) {
            setResult(`Solved. Flag: ${result.flag}`, "ok");
          } else {
            setResult("Not solved yet.");
          }
          setStatus("ready");
        } catch (error) {
          setResult(error.message, "err");
          setStatus("error");
        } finally {
          setBusy(false);
        }
      }

      async function copyValue(id) {
        const text = els[id].textContent;
        if (!text || text === "-") return;
        await navigator.clipboard.writeText(text);
        setStatus("copied");
        window.setTimeout(() => setStatus("ready"), 900);
      }

      document.querySelectorAll("[data-copy]").forEach((button) => {
        button.addEventListener("click", () => copyValue(button.dataset.copy));
      });

      els.challengeBtn.addEventListener("click", challenge);
      els.launchBtn.addEventListener("click", launch);
      els.checkBtn.addEventListener("click", check);
      loadExistingInstance();
    </script>
  </body>
</html>
