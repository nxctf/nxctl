# NXCTL configuration template

challenges:
  github_repo: https://github.com/your-username/your-repo
  branch: main
  access_token: ${GITHUB_TOKEN}

app:
  # NXCTL stores db, challenge cache, runtime state, locks, temp files, and logs under this dir.
  data_dir: ./data

  # Optional direct/public IP export. Leave empty to disable.
  base_ip: ""

api:
  # API security:
  # - token is optional normal API access control.
  # - admin_secret is required for dangerous/global API actions.
  token: ${NXCTL_API_TOKEN}
  admin_secret: ${NXCTL_API_ADMIN_SECRET}

ttl:
  default_minutes: 15
  extend_minutes: 10
  extend_threshold_minutes: 5
  extend_cooldown_seconds: 30

daemon:
  interval_seconds: 10
  restart_cooldown_seconds: 300

exports:
  auto_heal: true
  endpoint_check_interval_seconds: 150
  endpoint_check_timeout_seconds: 30

ports:
  local_start: 40000
  local_end: 49999
  randomize: true

tunnels:
  ngrok:
    enabled: true
    max_sessions_per_token: 3
    tokens:
      - ${NGROK_TOKEN_1}
      - ${NGROK_TOKEN_2}
      - ${NGROK_TOKEN_3}
      # - ${NGROK_TOKEN_4}

  localtunnel:
    enabled: true

  cloudflare:
    enabled: false
    # Leave these empty to use TryCloudflare (Quick Tunnel).
    # Fill direct config values below to use Cloudflare Named Tunnels.
    tunnel_name: ""
    credentials_file: ""
    subdomains: []
    # Example:
    # tunnel_name: edge
    # credentials_file: ~/.cloudflared/2b865acf-2600-4e55-bfc9-d48294f6b6a4.json
    # subdomains:
    #   - a.nxctf.my.id
    #   - b.nxctf.my.id

  pinggy:
    enabled: true
    max_sessions_per_token: 1
    # tokens:
    #   - ${PINGGY_TOKEN_1}
    #   - ${PINGGY_TOKEN_2}
    # Tokens is optional for Pinggy

  bore:
    enabled: true
    server: bore.pub
    only_tcp: true
