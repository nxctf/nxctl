# CTF Challenge Orchestration Engine - Configuration Template
# Copy this to config.yml and edit with your values

# ============================================================================
# Repository Configuration
# ============================================================================
github_repo: https://github.com/ariafatah0711/a
branch: main

# GitHub personal access token (or use ${GITHUB_TOKEN} env var)
# Required for private repos, optional for public ones
access_token: ${GITHUB_TOKEN}

# ============================================================================
# Paths
# ============================================================================

# Directory for cloned repository cache
cache_dir: ./data/cache

# Directory for build artifacts and metadata
build_dir: ./data/build

# SQLite database file path
db_file: ./data/ctf-orch.db

# ============================================================================
# Runtime Behavior
# ============================================================================

# Minutes of inactivity before auto-shutdown
idle_timeout_minutes: 15

# Minutes to wait between consecutive revert operations for same challenge
revert_cooldown_minutes: 5

# ============================================================================
# Default Tunnel Provider
# ============================================================================
# Options: ngrok, localtunnel, serveo, pinggy
# All are hosted providers (no self-hosted infrastructure needed)
default_tunnel: localtunnel

# ============================================================================
# Tunnel Providers Configuration
# ============================================================================
# HOSTED PROVIDERS ONLY - Free, no infrastructure setup required
# Each provider supports multiple tokens for load balancing and rotation
# Rotation strategy: round-robin (distribute load) or fallback (use next on error)

tunnels:

  # ngrok: Public tunneling service
  # Free tier: 4 concurrent tunnels, 40 requests/min per tunnel
  # Requires: Free account at https://ngrok.com
  ngrok:
    enabled: false
    rotation_strategy: round-robin
    tokens:
      - name: "ngrok-account-1"
        token: ${NGROK_TOKEN_1}
        region: us
      # - name: "ngrok-account-2"
      #   token: ${NGROK_TOKEN_2}
      #   region: eu

  # localtunnel: Simple HTTP tunneling
  # Free tier: Unlimited, no token needed (public URLs)
  # No setup required, just pick a subdomain name
  localtunnel:
    enabled: true
    rotation_strategy: round-robin
    # No token needed - use random subdomain names
    subdomains:
      - "" # Empty = random subdomain
      # Or specify custom subdomains (if available):
      # - "ctf-web-001"
      # - "ctf-web-002"

  # serveo: Direct SSH reverse proxy + HTTP tunneling
  # Free tier: Unlimited, no account/token needed
  # Supports auto-SSH tunneling or direct HTTP
  serveo:
    enabled: false
    rotation_strategy: round-robin
    # No token needed for basic HTTP forwarding
    # Auto-generate URLs or use specific subdomain

  # pinggy: Minimal tunnel service
  # Free tier: 2 concurrent tunnels
  # No token needed for basic usage
  pinggy:
    enabled: false
    rotation_strategy: round-robin
    # No token needed - generates random URLs
