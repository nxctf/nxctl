# CTF Challenge Orchestration Engine - Configuration Template
# Copy this to config.yml and edit with your values

# ============================================================================
# Repository Configuration
# ============================================================================
github_repo: https://github.com/org/ctf-challenges
branch: main

# GitHub personal access token (or use ${GITHUB_TOKEN} env var)
# Required for private repos, optional for public ones
access_token: ${GITHUB_TOKEN}

# ============================================================================
# Paths
# ============================================================================

# Directory for cloned repository cache
cache_dir: ./data/cache

# Directory for build artifacts and metadata
build_dir: ./data/build

# SQLite database file path
db_file: ./data/ctf-orch.db

# ============================================================================
# Runtime Behavior
# ============================================================================

# Minutes of inactivity before auto-shutdown
idle_timeout_minutes: 15

# Minutes to wait between consecutive revert operations for same challenge
revert_cooldown_minutes: 5

# ============================================================================
# Default Tunnel Provider
# ============================================================================
# Options: frp, ngrok, rathole
default_tunnel: frp

# ============================================================================
# Tunnel Providers Configuration
# ============================================================================
# Each provider can have multiple tokens/servers for load balancing and failover
# Rotation strategy: round-robin (distribute load) or fallback (use next on error)

tunnels:

  # FRP: Self-hosted reverse proxy
  # Supports multiple FRP servers for failover and load balancing
  frp:
    enabled: true
    rotation_strategy: round-robin  # round-robin or fallback
    servers:
      - name: "frp-primary"
        server_addr: localhost
        server_port: 7000
        token: ${FRP_TOKEN_PRIMARY}
      # Add more FRP servers for failover/load balancing
      # - name: "frp-secondary"
      #   server_addr: frp2.example.com
      #   server_port: 7000
      #   token: ${FRP_TOKEN_SECONDARY}

  # ngrok: Simple public tunneling
  # Free service, supports multiple accounts for token rotation
  ngrok:
    enabled: false
    rotation_strategy: round-robin  # round-robin or fallback
    tokens:
      - name: "ngrok-account-1"
        token: ${NGROK_TOKEN_1}
        region: us
      # Add more ngrok tokens for account rotation
      # - name: "ngrok-account-2"
      #   token: ${NGROK_TOKEN_2}
      #   region: eu
      # - name: "ngrok-account-3"
      #   token: ${NGROK_TOKEN_3}
      #   region: ap

  # Rathole: Lightweight P2P reverse proxy
  # Self-hosted, low resource usage
  rathole:
    enabled: false
    rotation_strategy: round-robin
    servers:
      - name: "rathole-server-1"
        server_addr: localhost
        server_port: 5202
        token: ${RATHOLE_TOKEN_1}
      # - name: "rathole-server-2"
      #   server_addr: rathole2.example.com
      #   server_port: 5202
      #   token: ${RATHOLE_TOKEN_2}
