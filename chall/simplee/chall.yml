# challenge.yml
name: "simplee"
author: "aria"
category: "Web Exploitation"
description: |
  > Difficulty: Easy-Medium \
  Author: aria

  Welcome to simplee. The webapp has a simple page loader — maybe too simple. Find the flag.

  #### deploy local
  ```bash
  docker pull ariafatah/simplee
  docker run ariafaah/simplee -p 8001:80
  ```
type: standard
state: visible
max_attempts: 0
flags:
  - type: static
    content: "FGTE{null_byte_html_lfi_working}"
    data: null
    case_sensitive: false
  - type: dynamic
    content: "FGTE{null_byte_html_lfi_working}"
    data:
      function: linear
      initial: 500
      decay: 20
      minimum: 100
    case_sensitive: true
Connection Info: http://192.168.1.11:8001
hints:
  - content: "Perhatikan bagaimana aplikasi mengubah nama halaman. Coba kirimkan karakter yang biasanya “mengakhiri” string saat diproses oleh bahasa lain."
    cost: 10
  - content: "Kalau file utama terasa seperti 'decoy', pertimbangkan proses lain yang punya akses ke filesystem. Terkadang aplikasi atau user meninggalkan jejak yang lebih panjang — pikirkan di mana sistem menyimpan catatan aktivitas atau perintah."
    cost: 10
requirements: []
version: "0.1"
