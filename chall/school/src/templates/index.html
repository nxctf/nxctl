<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Greenfield High School Blog</title>
    <meta name="description" content="Greenfield High School - Student Blog & News" />
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  </head>
  <body class="bg-gray-50 text-gray-900">
    <!-- Navigation -->
    <nav class="bg-gradient-to-r from-blue-700 to-blue-900 shadow-lg sticky top-0 z-50">
      <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-3">
          <img src="https://img.icons8.com/color/48/000000/school.png" alt="logo" class="h-10 w-10">
          <div>
            <span class="text-white text-2xl font-bold block">Greenfield High</span>
            <span class="text-blue-200 text-xs">Student Blog</span>
          </div>
        </div>
        <div class="space-x-6 text-sm font-medium">
          <a href="/" class="text-white hover:text-blue-200">Home</a>
          <a href="/blog" class="text-white hover:text-blue-200">Blog</a>
          <a href="/about" class="text-white hover:text-blue-200">About</a>
        </div>
      </div>
    </nav>

    <!-- Hero Section -->
    <section class="bg-gradient-to-b from-blue-600 to-blue-500 text-white py-12 text-center">
      <div class="max-w-6xl mx-auto px-4">
        <h1 class="text-4xl font-bold mb-2">Greenfield High School Blog</h1>
        <p class="text-lg opacity-90">News, Updates & Student Stories</p>
      </div>
    </section>

    <main class="max-w-6xl mx-auto mt-12 px-4 pb-12">
      __BLOG_CONTENT__
    </main>

    <footer class="bg-white border-t py-4 mt-12">
      <div class="max-w-6xl mx-auto px-4 text-sm text-gray-600">© 2026 Greenfield High School. All rights reserved.</div>
    </footer>
  </body>
</html>
