app:
  data_dir: ./data_nxbcl

  # Public URL or host for the launcher panel when exposed behind a tunnel or reverse proxy.
  # Example: https://panel.nxctf.my.id
  # base_ip: "https://nxbcl.nxctf.my.id"

git:
  repo: https://github.com/ariafatah0711/a
  branch: main
  access_token: ${GITHUB_TOKEN}

pow:
  zero_prefix: "000"

session:
  ttl_seconds: 86400

# Configuration for challenge instances (per-user setup contracts)
challenge:
  ttl_seconds: 600
  extend_seconds: 300
  extend_threshold_seconds: 300

# Configuration for the shared RPC blockchain node
rpc:
  # Public URL or host for the RPC endpoint returned to players.
  # Example: https://rpc.nxctf.my.id
  # base_ip: "https://nxbcl-rpc.nxctf.my.id"
  base_ip: "http://192.168.56.101:8545"
  ttl_seconds: 1200
  extend_seconds: 600
  extend_threshold_seconds: 600

limits:
  max_concurrent: 1000
